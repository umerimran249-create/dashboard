  <line x1="227" y1="227" x2="227" y2="407" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="227" y1="227" x2="100" y2="354" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="227" y1="227" x2="47" y2="227" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="227" y1="227" x2="100" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
