  <ellipse cx="227" cy="255" rx="55" ry="62" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>
  <!-- Spider lines from center -->
  <line x1="227" y1="227" x2="227" y2="47" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="227" y1="227" x2="354" y2="100" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <line x1="227" y1="227" x2="407" y2="227" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
