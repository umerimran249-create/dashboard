  <rect x="212" y="185" width="30" height="140" rx="3" fill="#5a4a35" opacity="0.6" stroke="#6b5a42" stroke-width="1"/>
  <!-- Center -->
  <circle cx="227" cy="227" r="5" fill="rgba(255,255,255,0.3)"/>
